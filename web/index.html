<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#11130f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <meta
      name="description"
      content="GRAVITAS is a mobile workout planner, exercise library, active workout logger, and strength tracker."
    />
    <title>GRAVITAS</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="main-panel">
        <div class="top-strip">
          <h2 id="screenTitle">Home</h2>
          <div class="today-pill" id="todayPill"></div>
        </div>

        <section id="view" class="view" aria-live="polite"></section>
      </main>

      <nav class="bottom-nav" aria-label="Primary">
        <button class="bottom-tab active" data-route="home" type="button">
          <span class="tab-icon" aria-hidden="true"></span>
          <span class="tab-label">Home</span>
        </button>
        <button class="bottom-tab" data-route="planner" type="button">
          <span class="tab-icon" aria-hidden="true"></span>
          <span class="tab-label">Plan</span>
        </button>
        <button class="bottom-tab" data-route="stats" type="button">
          <span class="tab-icon" aria-hidden="true"></span>
          <span class="tab-label">Progress</span>
        </button>
        <button class="bottom-tab" data-route="settings" type="button">
          <span class="tab-icon" aria-hidden="true"></span>
          <span class="tab-label">Profile</span>
        </button>
      </nav>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <div id="deleteModal" class="delete-modal-overlay" aria-hidden="true">
      <div class="delete-modal">
        <div class="delete-modal-icon">🗑️</div>
        <h3>Delete Workout?</h3>
        <p class="muted">Ye workout session permanently delete ho jayega. Isko wapas nahi la sakte.</p>
        <div class="delete-modal-actions">
          <button class="button" id="deleteModalCancel" type="button">Cancel</button>
          <button class="button heat" id="deleteModalConfirm" type="button">Delete</button>
        </div>
      </div>
    </div>
    <script src="./data.js"></script>
    <script src="./exercise-guides.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="./firebase-config.js"></script>
    <script src="./firebase-sync.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
